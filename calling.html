<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Agent 测试终端</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .thread-id-display {
            font-size: 0.8rem;
            font-weight: normal;
            opacity: 0.8;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .message.ai {
            background-color: #e9ecef;
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 0;
            white-space: pre-wrap; /* 保持后端返回的换行格式 */
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        #message-input:focus {
            border-color: var(--primary-color);
        }
        button {
            padding: 0 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading {
            align-self: flex-start;
            color: #888;
            font-size: 0.9rem;
            display: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span>🤖 AI 研究员助手</span>
        <span class="thread-id-display" id="thread-id-display"></span>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message ai">你好！我是你的专属研究员 Agent。你可以问我关于公司休假政策、报销标准，或者让我查查 Github 的资源状态。</div>
    </div>
    <div class="loading" id="loading-indicator">Agent 正在思考并调用工具...</div>
    <div class="chat-input-area">
        <input type="text" id="message-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 生成一个随机的 thread_id，用于让后端识别同一个用户的上下文记忆
    const currentThreadId = "session_" + Math.random().toString(36).substring(2, 9);
    document.getElementById('thread-id-display').innerText = "Session: " + currentThreadId;

    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingIndicator = document.getElementById('loading-indicator');

    // 处理回车发送
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // 追加消息到界面
    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        // 自动滚动到底部
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 发送消息核心逻辑
async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    appendMessage('user', text);
    messageInput.value = '';
    
    // 创建一个空白的 AI 消息框，用于承载后续流式出的文字
    const aiMessageDiv = document.createElement('div');
    aiMessageDiv.className = 'message ai';
    chatMessages.appendChild(aiMessageDiv);

    try {
        const response = await fetch('http://localhost:8000/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ thread_id: currentThreadId, message: text })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            // 解码并追加文字到 AI 消息框
            const chunk = decoder.decode(value, { stream: true });
            aiMessageDiv.textContent += chunk;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

    } catch (error) {
        aiMessageDiv.textContent = "⚠️ 连接失败：" + error.message;
    }

    }
</script>

</body>
</html>
